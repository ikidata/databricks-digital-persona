<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Persona{% endblock %} | Databricks</title>
    <style>
        :root {
            --primary: #FF3621;
            --primary-dark: #E02B15;
            --bg: #0D1117;
            --surface: #161B22;
            --surface-2: #21262D;
            --border: #30363D;
            --text: #E6EDF3;
            --text-muted: #8B949E;
            --success: #3FB950;
            --error: #F85149;
            --warning: #D29922;
            --info: #58A6FF;
            --chart-1: #FF3621;
            --chart-2: #58A6FF;
            --chart-3: #3FB950;
            --chart-4: #D29922;
            --chart-5: #BC8CFF;
            --chart-6: #F778BA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            text-decoration: none;
            margin-right: 32px;
        }

        .navbar-brand svg { flex-shrink: 0; }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
            flex: 1;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-links a:hover {
            color: var(--text);
            background: var(--surface-2);
        }

        .nav-links a.active {
            color: var(--text);
            background: var(--surface-2);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .nav-user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        /* Main content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card-header {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover { background: var(--primary-dark); }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background: var(--border); }

        /* Status badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success { background: rgba(63,185,80,0.15); color: var(--success); }
        .badge-error { background: rgba(248,81,73,0.15); color: var(--error); }
        .badge-warning { background: rgba(210,153,34,0.15); color: var(--warning); }
        .badge-info { background: rgba(88,166,255,0.15); color: var(--info); }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .data-table th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table tr:last-child td { border-bottom: none; }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--surface-2);
            border-radius: 4px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        /* Stat cards */
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Chart containers */
        .chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }

        /* Horizontal bar chart */
        .h-bar { margin: 6px 0; }

        .h-bar-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
        }

        .h-bar-track {
            height: 22px;
            background: var(--surface-2);
            border-radius: 4px;
            overflow: hidden;
        }

        .h-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            min-width: 2px;
        }

        /* Page fade-in animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-content {
            animation: fadeInUp 0.4s ease;
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Textarea for system prompt */
        .prompt-textarea {
            width: 100%;
            min-height: 400px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: vertical;
        }

        .prompt-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px;
        }

        /* Tooltip */
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--surface-2);
            color: var(--text-muted);
            font-size: 11px;
            cursor: help;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7l10 5 10-5-10-5z" fill="var(--primary)"/>
                <path d="M2 17l10 5 10-5" stroke="var(--primary)" stroke-width="2" fill="none"/>
                <path d="M2 12l10 5 10-5" stroke="var(--primary)" stroke-width="2" fill="none" opacity="0.6"/>
            </svg>
            Digital Persona
        </a>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
            <li><a href="/check-access" class="{% if request.path == '/check-access' %}active{% endif %}">Check Access</a></li>
            <li><a href="/analyze" class="{% if request.path == '/analyze' %}active{% endif %}">Run Analysis</a></li>
            <li><a href="/persona" class="{% if request.path == '/persona' %}active{% endif %}">Persona</a></li>
            <li><a href="/digital-version" class="{% if request.path == '/digital-version' %}active{% endif %}">Digital Version</a></li>
        </ul>
        <div class="nav-user">
            <div class="nav-user-avatar">{{ username[0]|upper if username else '?' }}</div>
            <span>{{ user_email }}</span>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
